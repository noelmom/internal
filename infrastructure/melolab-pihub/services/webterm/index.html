<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SSH</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
  @font-face { font-family:"CaskaydiaCove Nerd Font"; src: local("CaskaydiaCove Nerd Font"), local("CaskaydiaCove Nerd Font Mono"), url("font.woff2") format("woff2"); font-display:swap; }
  html,body { margin:0; height:100%; background:#141413; display:flex; flex-direction:column; }
  #t { flex:1 1 auto; min-height:0; padding:6px; }
  #kb { flex:0 0 auto; display:none; gap:6px; padding:8px; overflow-x:auto; background:#1b1b1a; border-top:0.5px solid #3a3a38; -webkit-overflow-scrolling:touch; }
  #kb.on { display:flex; }
  #kb button { flex:0 0 auto; height:40px; min-width:42px; padding:0 12px; background:#242423; color:#eceae3; border:0.5px solid #5f5e5a; border-radius:8px; font:inherit; font-size:14px; display:inline-flex; align-items:center; justify-content:center; touch-action:manipulation; }
  #kb button.on { background:#378ADD; border-color:#378ADD; color:#fff; }
  #fz { position:fixed; top:6px; right:10px; z-index:5; display:flex; gap:4px; opacity:0.5; transition:opacity .15s; }
  #fz:hover { opacity:1; }
  #fz button { width:30px; height:30px; padding:0; background:rgba(36,36,35,0.85); color:#eceae3; border:0.5px solid #5f5e5a; border-radius:7px; font:inherit; font-size:15px; line-height:1; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; touch-action:manipulation; }
  #fz button.on { background:#378ADD; border-color:#378ADD; color:#fff; }
  #selbtn { width:auto; padding:0 9px; font-size:13px; }
</style>
</head>
<body>
<div id="t"></div>
<div id="fz"><button id="selbtn" title="tmux mouse: on = scroll wheel; off = drag-select/copy + click links (default)">Scrl</button><button data-fz="-1" aria-label="smaller font">A-</button><button data-fz="1" aria-label="larger font">A+</button></div>
<div id="kb">
  <button data-k="esc">Esc</button>
  <button data-k="ctrl">Ctrl</button>
  <button data-k="prefix">C-b</button>
  <button data-k="tab">Tab</button>
  <button data-k="left" aria-label="left"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
  <button data-k="down" aria-label="down"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg></button>
  <button data-k="up" aria-label="up"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
  <button data-k="right" aria-label="right"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
  <button data-k="enter">Enter</button>
  <button data-k="bksp">Bksp</button>
  <button data-k="pgup">PgUp</button>
  <button data-k="pgdn">PgDn</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<script>
  var IN = String.fromCharCode(0), RS = String.fromCharCode(1), E = String.fromCharCode(27);
  var SEQ = {
    esc: E, tab: String.fromCharCode(9), enter: String.fromCharCode(13), bksp: String.fromCharCode(127),
    up: E+"[A", down: E+"[B", right: E+"[C", left: E+"[D",
    pgup: String.fromCharCode(2)+E+"[5~", pgdn: E+"[6~", prefix: String.fromCharCode(2)
  };
  var FZKEY = "webterm_fontsize";
  var fzSaved = parseInt(localStorage.getItem(FZKEY) || "", 10);
  var fzInit = (fzSaved >= 8 && fzSaved <= 28) ? fzSaved : 12;
  var term = new Terminal({
    fontSize: fzInit, fontFamily: "'CaskaydiaCove Nerd Font', ui-monospace, SFMono-Regular, Menlo, monospace",
    cursorBlink: true, scrollback: 50000,
    theme: { background: "#141413", foreground: "#eceae3", cursor: "#9FE1CB" }
  });
  var fit = new FitAddon.FitAddon(); term.loadAddon(fit);
  if (window.WebLinksAddon) term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open(document.getElementById("t")); fit.fit();
  function setFont(n){ n = Math.max(8, Math.min(28, n)); term.options.fontSize = n; try { localStorage.setItem(FZKEY, n); } catch(e){} fit.fit(); if (typeof sendSize === "function") sendSize(); }
  document.querySelectorAll("#fz button[data-fz]").forEach(function(b){
    b.addEventListener("mousedown", function(e){ e.preventDefault(); });
    b.addEventListener("click", function(){ setFont(term.options.fontSize + parseInt(b.dataset.fz, 10)); });
  });
  var isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
  var proto = location.protocol === "https:" ? "wss" : "ws";
  var target = new URLSearchParams(location.search).get("t") || "";
  document.title = (target ? target.charAt(0).toUpperCase()+target.slice(1) : "webterm") + " SSH";
  var wsbase = location.pathname.replace(/[^/]*$/, "");
  var ws = new WebSocket(proto + "://" + location.host + wsbase + "ws?t=" + encodeURIComponent(target));
  ws.binaryType = "arraybuffer";
  function sendSize(){ try { ws.send(RS + JSON.stringify({cols: term.cols, rows: term.rows})); } catch(e){} }
  ws.onopen = function(){ sendSize(); if(!isTouch) term.focus(); };
  ws.onmessage = function(e){ term.write(typeof e.data === "string" ? e.data : new Uint8Array(e.data)); };
  ws.onclose = function(){ term.write("\r\n[disconnected]\r\n"); };
  function execCopy(t){
    var ta=document.createElement("textarea"); ta.value=t; ta.setAttribute("readonly",""); ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); try { ta.setSelectionRange(0, t.length); } catch(e){}
    try { document.execCommand("copy"); } catch(e){}
    document.body.removeChild(ta); term.focus();
  }
  function copyText(t){
    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(t).catch(function(){ execCopy(t); }); }
    else { execCopy(t); }
  }
  term.attachCustomKeyEventHandler(function(e){
    if (e.type !== "keydown") return true;
    var k = (e.key || "").toLowerCase();
    if ((e.metaKey && k==="c") || (e.ctrlKey && e.shiftKey && k==="c") || (e.ctrlKey && !e.shiftKey && !e.metaKey && k==="c" && term.hasSelection())) {
      if (term.hasSelection()) copyText(term.getSelection());
      return false;
    }
    return true;
  });
  var ctrl = false;
  function ctrlBtn(){ var b=document.querySelector("#kb [data-k=ctrl]"); if(b) b.classList.toggle("on", ctrl); }
  term.onData(function(d){
    if (ctrl && d.length === 1) {
      var lc = d.toLowerCase().charCodeAt(0);
      if (lc >= 97 && lc <= 122) { ws.send(IN + String.fromCharCode(lc & 0x1f)); ctrl = false; ctrlBtn(); return; }
    }
    ws.send(IN + d);
  });
  document.querySelectorAll("#kb button").forEach(function(b){
    b.addEventListener("mousedown", function(e){ e.preventDefault(); });
    b.addEventListener("click", function(){
      var k = b.dataset.k;
      if (k === "ctrl") { ctrl = !ctrl; ctrlBtn(); return; }
      var s = SEQ[k];
      if (s !== undefined) { ws.send(IN + s); }
    });
  });
  var mouseOn = false, selbtn = document.getElementById("selbtn");
  function setMouse(on){
    mouseOn = on;
    ws.send(IN + String.fromCharCode(2) + ":set -g mouse " + (on ? "on" : "off") + String.fromCharCode(13));
    selbtn.classList.toggle("on", on);
  }
  selbtn.addEventListener("mousedown", function(e){ e.preventDefault(); });
  selbtn.addEventListener("click", function(){ setMouse(!mouseOn); });
  function refit(){ fit.fit(); sendSize(); }
  if (document.fonts && document.fonts.load) { document.fonts.load('12px "CaskaydiaCove Nerd Font"').then(refit).catch(function(){}); }
  window.addEventListener("resize", refit);
  if (window.visualViewport) window.visualViewport.addEventListener("resize", refit);
  if (isTouch) document.getElementById("kb").classList.add("on");
</script>
</body>
</html>
