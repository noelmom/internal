map $http_upgrade $conn_upgrade { default upgrade; "" close; }

server {
    listen 443 ssl;
    http2 on;
    server_name pihub.tail9b70d.ts.net;

    ssl_certificate     /certs/tls.crt;
    ssl_certificate_key /certs/tls.key;
    error_page 497 https://$host:8090$request_uri;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Guacamole (VNC/RDP + guac SSH), same-origin
    location /guacamole/ {
        proxy_pass http://guacamole:8080/guacamole/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $conn_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path /guacamole/ /guacamole/;
        proxy_read_timeout 3600s;
        access_log off;
    }

    # xterm.js web terminal, same-origin
    location /webterm/ {
        proxy_pass http://webterm:8091/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        access_log off;
    }
}

# redirect plain HTTP to HTTPS
server {
    listen 80;
    server_name pihub.tail9b70d.ts.net;
    return 301 https://$host:8090$request_uri;
}
