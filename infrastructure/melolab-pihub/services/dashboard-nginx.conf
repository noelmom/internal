map $http_upgrade $conn_upgrade { default upgrade; "" close; }

server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Same-origin reverse proxy to Guacamole so the dashboard can drive the
    # embedded client (key injection) without cross-origin restrictions.
    location /guacamole/ {
        proxy_pass http://guacamole:8080/guacamole/;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $conn_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path /guacamole/ /guacamole/;
        proxy_read_timeout 3600s;
        access_log off;
    }
}
